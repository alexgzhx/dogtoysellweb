<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PawsJoy - 狗狗玩具精选</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo">
        <span class="icon">🐾</span> PawsJoy
      </a>
      <ul class="nav-links">
        <li><a href="/">首页</a></li>
        <li><a href="#products">全部产品</a></li>
        <li><a href="#contact">联系我们</a></li>
      </ul>
    </div>
  </nav>

  <!-- Banner -->
  <header class="banner">
    <div class="container">
      <h1>🐶 给狗狗最好的玩具</h1>
      <p>精选高品质狗狗玩具，让您的爱犬快乐每一天。全部产品可在亚马逊购买，快速配送到家。</p>
    </div>
  </header>

  <!-- 产品区域 -->
  <section class="products-section" id="products">
    <div class="container">
      <h2 class="section-title">全部产品</h2>
      <div class="product-grid" id="productGrid">
        <!-- JS 动态渲染 -->
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer" id="contact">
    <div class="container">
      <div class="footer-content">
        <div>
          <h3>🐾 PawsJoy</h3>
          <p>我们致力于为狗狗提供安全、有趣、耐用的玩具产品。每一款产品都经过精心挑选，让您买得放心，狗狗玩得开心。</p>
        </div>
        <div>
          <h3>联系方式</h3>
          <ul id="footerContact">
            <!-- JS 动态渲染 -->
          </ul>
        </div>
        <div>
          <h3>购买渠道</h3>
          <p>所有产品均通过亚马逊售卖，点击产品进入详情页即可找到购买链接。</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 PawsJoy. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
